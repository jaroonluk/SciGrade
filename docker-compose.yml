services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scigrade-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      APP_URL: http://127.0.0.1:8080
    networks:
      - scigrade

  nginx:
    image: nginx:alpine
    container_name: my-SciGrade
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - scigrade

networks:
  scigrade:
    driver: bridge
