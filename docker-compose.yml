services:
  scigrade-fpm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scigrade-app
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/var/www/html
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    environment:
      APP_URL: http://127.0.0.1:8080
      SCIGRAD_DB_HOST: host.docker.internal
      SCIGRAD_DB_PORT: 3306
      SCIGRAD_DB_DATABASE: scigraddb
      SCIGRAD_DB_USERNAME: root
      SCIGRAD_DB_PASSWORD: ""
    networks:
      - scigrade

  nginx:
    image: nginx:alpine
    container_name: my-SciGrade
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - scigrade-fpm
    networks:
      - scigrade

networks:
  scigrade:
    driver: bridge
